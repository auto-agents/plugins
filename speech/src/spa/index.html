<!doctype html>
<html lang="en">

<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Auto Agents - Speech Plugin</title>
	<style>
		:root {
			color-scheme: light dark;
		}

		body {
			font-family: Arial, Helvetica, sans-serif;
			margin: 20px;
		}

		.grid {
			display: grid;
			grid-template-columns: 200px 1fr;
			row-gap: 8px;
			column-gap: 12px;
			max-width: 900px;
		}

		.label {
			opacity: 0.75;
		}

		.badge {
			display: inline-block;
			padding: 2px 8px;
			border-radius: 999px;
			border: 1px solid #777;
		}

		.badge.ok {
			border-color: #2a7;
		}

		.badge.ko {
			border-color: #c33;
		}

		pre {
			white-space: pre-wrap;
		}

		h1,
		h2 {
			margin-bottom: 0em;
			margin-top: 0em;
		}

		h2 {
			font-size: 1.2em;
		}

		h3 {
			font-size: 0.9em;
			font-weight: normal;
			margin-top: 0.25em;
		}

		hr {
			margin-top: 1.5em;
			margin-bottom: 1.5em;
		}

		#logs {
			margin-top: 1em;
		}
	</style>
</head>

<body>
	<h1>Speech plugin</h1>
	<h2>Auto Agents</h2>
	<h3><a href="https://github.com/auto-agents/plugins" target="_blank">https://github.com/auto-agents/plugins</a></h3>
	<hr>
	<div class="grid">
		<div class="label">WebSocket</div>
		<div><span id="ws" class="badge">connecting</span></div>

		<div class="label">runningStatus</div>
		<div><span id="status" class="badge">unknown</span></div>

		<div class="label">activity</div>
		<div><span id="activity">-</span></div>

		<div class="label">voices</div>
		<div><span id="voicesCount">0</span></div>
	</div>

	<hr>

	<h2 id="logs">Logs</h2>
	<pre id="log"></pre>

	<hr>

	<h2>Available voices</h2>
	<pre id="voices"></pre>

	<script type="module" src="./app.js"></script>
</body>

</html>
